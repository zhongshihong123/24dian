<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24点游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .numbers-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .number-card {
            width: 80px;
            height: 100px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3);
            transform: translateY(0);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .number-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 70%
            );
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.6s;
        }

        .number-card:hover::before {
            transform: rotate(45deg) translateX(100%);
        }

        .number-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 30px rgba(245, 87, 108, 0.4);
        }

        .number-card.animate {
            animation: flipIn 0.6s ease;
        }

        @keyframes flipIn {
            0% {
                transform: rotateY(90deg) scale(0.5);
                opacity: 0;
            }
            50% {
                transform: rotateY(0deg) scale(1.1);
            }
            100% {
                transform: rotateY(0deg) scale(1);
                opacity: 1;
            }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1.1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .result-message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .result-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .result-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .timer {
            text-align: center;
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .timer.running {
            color: #667eea;
            font-weight: bold;
        }

        .history {
            max-height: 200px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .history h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .history-item {
            padding: 8px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .history-item.solved {
            border-left: 4px solid #28a745;
        }

        .history-item.unsolved {
            border-left: 4px solid #dc3545;
        }

        .rules {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #1565c0;
        }

        .rules strong {
            display: block;
            margin-bottom: 5px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .number-card {
                width: 65px;
                height: 85px;
                font-size: 2em;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="game-container">
        <h1>🎯 24点</h1>
        <p class="subtitle">用加减乘除让四个数字等于24</p>

        <div class="rules">
            <strong>📋 游戏规则：</strong>
            使用 + - × ÷ 和括号，每个数字必须且只能用一次，使结果等于24
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="attempts">0</div>
                <div class="stat-label">尝试次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="solved">0</div>
                <div class="stat-label">已解决</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="bestTime">--</div>
                <div class="stat-label">最佳用时</div>
            </div>
        </div>

        <div class="timer" id="timer">⏱️ 00:00</div>

        <div class="numbers-display" id="numbersDisplay">
            <div class="number-card">?</div>
            <div class="number-card">?</div>
            <div class="number-card">?</div>
            <div class="number-card">?</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="generateNumbers()">
                🎲 生成数字
            </button>
        </div>

        <div class="input-section" id="inputSection" style="display: none;">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="输入算式，如: (3+5)*3" 
                       onkeypress="if(event.key==='Enter')checkAnswer()">
                <button class="btn btn-primary" onclick="checkAnswer()">验证</button>
            </div>
            <button class="btn btn-secondary" onclick="showHint()">💡 提示答案</button>

            <div class="result-message" id="resultMessage"></div>
        </div>

        <div class="history" id="history" style="display: none;">
            <h3>📜 历史记录</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let currentNumbers = [];
        let startTime = null;
        let timerInterval = null;
        let attempts = 0;
        let solved = 0;
        let bestTime = Infinity;
        let history = [];

        function generateNumbers() {
            // 生成4个1-10的随机数
            currentNumbers = [];
            for (let i = 0; i < 4; i++) {
                currentNumbers.push(Math.floor(Math.random() * 10) + 1);
            }

            // 显示数字
            const display = document.getElementById('numbersDisplay');
            display.innerHTML = '';
            currentNumbers.forEach((num, index) => {
                const card = document.createElement('div');
                card.className = 'number-card animate';
                card.textContent = num;
                card.style.animationDelay = `${index * 0.1}s`;
                display.appendChild(card);
            });

            // 显示输入区域
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('userInput').value = '';
            document.getElementById('resultMessage').className = 'result-message';

            // 开始计时
            startTimer();

            // 增加尝试次数
            attempts++;
            updateStats();
        }

        function startTimer() {
            startTime = Date.now();
            const timerEl = document.getElementById('timer');
            timerEl.classList.add('running');

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const seconds = (elapsed % 60).toString().padStart(2, '0');
                timerEl.textContent = `⏱️ ${minutes}:${seconds}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('timer').classList.remove('running');
        }

        function checkAnswer() {
            const input = document.getElementById('userInput').value.trim();
            const resultEl = document.getElementById('resultMessage');

            if (!input) {
                showResult('请输入算式！', false);
                return;
            }

            // 验证使用的数字
            const usedNumbers = extractNumbers(input);
            const sortedCurrent = [...currentNumbers].sort((a, b) => a - b);
            const sortedUsed = [...usedNumbers].sort((a, b) => a - b);

            if (JSON.stringify(sortedCurrent) !== JSON.stringify(sortedUsed)) {
                showResult('必须使用且只能使用给定的四个数字！', false);
                return;
            }

            // 计算结果
            try {
                // 替换显示符号为JS运算符
                let expression = input
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/x/g, '*')
                    .replace(/X/g, '*');

                // 安全检查：只允许数字和运算符
                if (!/^[\d+\-*/().\s]+$/.test(expression)) {
                    showResult('算式包含非法字符！', false);
                    return;
                }

                const result = eval(expression);

                if (Math.abs(result - 24) < 0.0001) {
                    stopTimer();
                    const timeUsed = Math.floor((Date.now() - startTime) / 1000);

                    if (timeUsed < bestTime) {
                        bestTime = timeUsed;
                    }

                    solved++;
                    updateStats();
                    addToHistory(true, input, timeUsed);
                    showResult(`🎉 恭喜你！答案正确！用时 ${timeUsed} 秒`, true);

                    // 创建庆祝效果
                    createConfetti();
                } else {
                    showResult(`❌ 结果是 ${result.toFixed(2)}，不是24，再试试！`, false);
                }
            } catch (e) {
                showResult('算式格式错误，请检查！', false);
            }
        }

        function extractNumbers(expression) {
            const numbers = [];
            const matches = expression.match(/\d+/g);
            if (matches) {
                matches.forEach(n => numbers.push(parseInt(n)));
            }
            return numbers;
        }

        function showResult(message, isSuccess) {
            const resultEl = document.getElementById('resultMessage');
            resultEl.textContent = message;
            resultEl.className = `result-message ${isSuccess ? 'success' : 'error'} show`;
        }

        function showHint() {
            // 简单的提示：尝试找到解决方案
            const solution = findSolution(currentNumbers);
            if (solution) {
                showResult(`💡 提示：${solution}`, false);
            } else {
                showResult('这组数字无解，点击"生成数字"换一组！', false);
            }
        }

        function findSolution(nums) {
            // 简单的24点求解器（尝试常见组合）
            const ops = ['+', '-', '*', '/'];
            const permutations = getPermutations(nums);

            for (let perm of permutations) {
                const [a, b, c, d] = perm;
                // 尝试不同的运算组合
                for (let op1 of ops) {
                    for (let op2 of ops) {
                        for (let op3 of ops) {
                            // 不同括号组合
                            const patterns = [
                                `(${a}${op1}${b})${op2}(${c}${op3}${d})`,
                                `((${a}${op1}${b})${op2}${c})${op3}${d}`,
                                `${a}${op1}((${b}${op2}${c})${op3}${d})`,
                                `${a}${op1}(${b}${op2}(${c}${op3}${d}))`,
                                `(${a}${op1}(${b}${op2}${c}))${op3}${d}`
                            ];

                            for (let pattern of patterns) {
                                try {
                                    const expr = pattern
                                        .replace(/\*/g, '×')
                                        .replace(/\//g, '÷');
                                    const result = eval(pattern);
                                    if (Math.abs(result - 24) < 0.0001) {
                                        return expr;
                                    }
                                } catch (e) {}
                            }
                        }
                    }
                }
            }
            return null;
        }

        function getPermutations(arr) {
            if (arr.length <= 1) return [arr];
            const result = [];
            for (let i = 0; i < arr.length; i++) {
                const current = arr[i];
                const remaining = [...arr.slice(0, i), ...arr.slice(i + 1)];
                const perms = getPermutations(remaining);
                for (let perm of perms) {
                    result.push([current, ...perm]);
                }
            }
            return result;
        }

        function updateStats() {
            document.getElementById('attempts').textContent = attempts;
            document.getElementById('solved').textContent = solved;
            document.getElementById('bestTime').textContent = 
                bestTime === Infinity ? '--' : `${bestTime}s`;
        }

        function addToHistory(isSolved, expression, time) {
            const historyEl = document.getElementById('history');
            const listEl = document.getElementById('historyList');
            historyEl.style.display = 'block';

            const item = document.createElement('div');
            item.className = `history-item ${isSolved ? 'solved' : 'unsolved'}`;
            item.innerHTML = `
                <span>${currentNumbers.join(', ')} → ${expression}</span>
                <span>${isSolved ? '✓ ' + time + 's' : '✗'}</span>
            `;

            listEl.insertBefore(item, listEl.firstChild);

            // 限制历史记录数量
            while (listEl.children.length > 10) {
                listEl.removeChild(listEl.lastChild);
            }
        }

        function createConfetti() {
            const colors = ['#f093fb', '#f5576c', '#667eea', '#764ba2', '#4facfe', '#00f2fe'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.cssText = `
                        position: fixed;
                        width: 10px;
                        height: 10px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: ${Math.random() * 100}vw;
                        top: -10px;
                        border-radius: 50%;
                        pointer-events: none;
                        z-index: 9999;
                    `;
                    document.body.appendChild(confetti);

                    const duration = 1000 + Math.random() * 2000;
                    const x = (Math.random() - 0.5) * 200;

                    confetti.animate([
                        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                        { transform: `translateY(100vh) translateX(${x}px) rotate(720deg)`, opacity: 0 }
                    ], {
                        duration: duration,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                    }).onfinish = () => confetti.remove();
                }, i * 30);
            }
        }

        // 页面加载时自动生成第一组数字
        window.onload = () => {
            setTimeout(generateNumbers, 500);
        };
    </script>
</body>
</html>
